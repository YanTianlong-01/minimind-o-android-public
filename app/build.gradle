plugins {
    id "com.android.application"
}

android {
    namespace "com.minimind.phone"
    compileSdk 36
    ndkVersion "30.0.14904198"

    defaultConfig {
        applicationId "com.minimind.phone"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        ndk {
            abiFilters "arm64-v8a"
        }

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -fexceptions -frtti"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "4.1.2"
        }
    }
}

dependencies {
    implementation "com.microsoft.onnxruntime:onnxruntime-android:1.23.0"
}
